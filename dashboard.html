<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ZhipuAI Coding Plan 使用量监控</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            min-height: 100vh;
            color: #e0e0e0;
            padding: 20px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        header {
            text-align: center;
            margin-bottom: 30px;
        }

        header h1 {
            font-size: 2.5rem;
            background: linear-gradient(90deg, #00d4ff, #7c3aed);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 10px;
        }

        header .subtitle {
            color: #888;
            font-size: 1rem;
        }

        .status-bar {
            display: flex;
            justify-content: center;
            gap: 15px;
            margin-bottom: 30px;
            flex-wrap: wrap;
        }

        .status-item {
            background: rgba(255, 255, 255, 0.05);
            padding: 10px 20px;
            border-radius: 20px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .status-item .dot {
            width: 10px;
            height: 10px;
            border-radius: 50%;
        }

        .status-item .dot.online { background: #22c55e; }
        .status-item .dot.offline { background: #ef4444; }
        .status-item .dot.refreshing { background: #f59e0b; animation: pulse 1s infinite; }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }

        .refresh-btn {
            background: linear-gradient(135deg, #3b82f6, #1d4ed8);
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 20px;
            cursor: pointer;
            font-size: 0.9rem;
            display: flex;
            align-items: center;
            gap: 8px;
            transition: all 0.2s;
        }

        .refresh-btn:hover {
            transform: scale(1.05);
            box-shadow: 0 4px 15px rgba(59, 130, 246, 0.4);
        }

        .refresh-btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }

        .refresh-btn .spinner {
            width: 14px;
            height: 14px;
            border: 2px solid rgba(255,255,255,0.3);
            border-top-color: white;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .countdown {
            color: #f59e0b;
            font-weight: 600;
        }

        .cards-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .card {
            background: rgba(255, 255, 255, 0.05);
            border-radius: 16px;
            padding: 24px;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .card-header {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 20px;
        }

        .card-icon {
            width: 48px;
            height: 48px;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.5rem;
        }

        .card-icon.quota { background: linear-gradient(135deg, #3b82f6, #1d4ed8); }
        .card-icon.model { background: linear-gradient(135deg, #8b5cf6, #6d28d9); }
        .card-icon.tool { background: linear-gradient(135deg, #10b981, #059669); }
        .card-icon.api { background: linear-gradient(135deg, #f59e0b, #d97706); }

        .card-title h2 {
            font-size: 1.1rem;
            color: #fff;
        }

        .card-title span {
            font-size: 0.85rem;
            color: #888;
        }

        .quota-item {
            margin-bottom: 20px;
        }

        .quota-item:last-child {
            margin-bottom: 0;
        }

        .quota-label {
            display: flex;
            justify-content: space-between;
            margin-bottom: 8px;
        }

        .quota-label .name {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .quota-label .percentage {
            font-weight: 600;
            font-size: 1.1rem;
        }

        .progress-bar {
            height: 12px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 6px;
            overflow: hidden;
            margin-bottom: 6px;
        }

        .progress-fill {
            height: 100%;
            border-radius: 6px;
            transition: width 0.5s ease;
        }

        .progress-fill.low { background: linear-gradient(90deg, #22c55e, #16a34a); }
        .progress-fill.medium { background: linear-gradient(90deg, #f59e0b, #d97706); }
        .progress-fill.high { background: linear-gradient(90deg, #ef4444, #dc2626); }

        .quota-meta {
            font-size: 0.85rem;
            color: #888;
            display: flex;
            justify-content: space-between;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 16px;
        }

        .stat-item {
            background: rgba(255, 255, 255, 0.03);
            padding: 16px;
            border-radius: 12px;
            text-align: center;
        }

        .stat-value {
            font-size: 1.8rem;
            font-weight: 700;
            margin-bottom: 4px;
        }

        .stat-value.blue { color: #3b82f6; }
        .stat-value.purple { color: #8b5cf6; }
        .stat-value.green { color: #10b981; }
        .stat-value.orange { color: #f59e0b; }

        .stat-label {
            font-size: 0.85rem;
            color: #888;
        }

        .tool-list {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .tool-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 16px;
            background: rgba(255, 255, 255, 0.03);
            border-radius: 10px;
        }

        .tool-name {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .tool-name .icon {
            width: 32px;
            height: 32px;
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1rem;
        }

        .tool-count {
            font-weight: 600;
            font-size: 1.1rem;
        }

        .history-section {
            margin-top: 30px;
        }

        .history-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }

        .history-header h2 {
            font-size: 1.5rem;
        }

        .chart-container {
            background: rgba(255, 255, 255, 0.05);
            border-radius: 16px;
            padding: 24px;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .chart {
            height: 200px;
            display: flex;
            align-items: flex-end;
            gap: 8px;
            padding-top: 20px;
        }

        .chart-bar {
            flex: 1;
            background: linear-gradient(180deg, #3b82f6, #1d4ed8);
            border-radius: 4px 4px 0 0;
            position: relative;
            min-height: 4px;
            transition: height 0.3s ease;
        }

        .chart-bar:hover {
            opacity: 0.8;
        }

        .chart-bar::after {
            content: attr(data-value);
            position: absolute;
            bottom: 100%;
            left: 50%;
            transform: translateX(-50%);
            font-size: 0.7rem;
            color: #888;
            white-space: nowrap;
        }

        .chart-labels {
            display: flex;
            gap: 8px;
            margin-top: 10px;
        }

        .chart-labels span {
            flex: 1;
            text-align: center;
            font-size: 0.75rem;
            color: #666;
        }

        .api-status {
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        .api-test {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 16px;
            background: rgba(255, 255, 255, 0.03);
            border-radius: 12px;
        }

        .api-test .label {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .badge {
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 0.85rem;
            font-weight: 600;
        }

        .badge.success { background: rgba(34, 197, 94, 0.2); color: #22c55e; }
        .badge.error { background: rgba(239, 68, 68, 0.2); color: #ef4444; }

        .error-message {
            text-align: center;
            padding: 60px 20px;
        }

        .error-message h2 {
            color: #ef4444;
            margin-bottom: 16px;
        }

        .error-message p {
            color: #888;
            margin-bottom: 20px;
        }

        .btn {
            background: linear-gradient(135deg, #3b82f6, #1d4ed8);
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 10px;
            cursor: pointer;
            font-size: 1rem;
            transition: transform 0.2s;
        }

        .btn:hover {
            transform: scale(1.05);
        }

        .loading {
            text-align: center;
            padding: 60px 20px;
        }

        .loading .spinner {
            width: 50px;
            height: 50px;
            border: 4px solid rgba(255, 255, 255, 0.1);
            border-top-color: #3b82f6;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto 20px;
        }

        footer {
            text-align: center;
            margin-top: 40px;
            padding-top: 20px;
            border-top: 1px solid rgba(255, 255, 255, 0.1);
            color: #666;
            font-size: 0.9rem;
        }

        @media (max-width: 768px) {
            header h1 {
                font-size: 1.8rem;
            }

            .cards-grid {
                grid-template-columns: 1fr;
            }

            .stats-grid {
                grid-template-columns: 1fr;
            }

            .status-bar {
                gap: 10px;
            }

            .status-item {
                padding: 8px 12px;
                font-size: 0.85rem;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>🤖 ZhipuAI Coding Plan</h1>
            <p class="subtitle">实时使用量监控面板</p>
        </header>

        <div class="status-bar">
            <div class="status-item">
                <span class="dot" id="status-dot"></span>
                <span id="status-text">加载中...</span>
            </div>
            <div class="status-item">
                <span>📅</span>
                <span>上次更新: <strong id="last-update">--</strong></span>
            </div>
            <div class="status-item">
                <span>⏰</span>
                <span>下次更新: <strong class="countdown" id="countdown">--</strong></span>
            </div>
            <div class="status-item">
                <span>🏷️</span>
                <span>账户等级: <strong id="account-level">--</strong></span>
            </div>
            <button class="refresh-btn" id="refresh-btn" onclick="forceRefresh()">
                <span id="refresh-icon">🔄</span>
                <span>强制更新</span>
            </button>
        </div>

        <div id="content">
            <div class="loading">
                <div class="spinner"></div>
                <p>正在加载数据...</p>
            </div>
        </div>

        <footer>
            <p>ZhipuAI Usage Monitor © 2026 | 自动刷新间隔: <span id="refresh-interval">15</span> 分钟</p>
        </footer>
    </div>

    <script>
        // Configuration
        const API_BASE = '';  // Same origin
        const JSON_FILE = 'usage_history.json';
        const REFRESH_INTERVAL = 60000; // 60秒页面刷新

        // State
        let lastUpdateTime = null;
        let nextUpdateTime = null;
        let refreshIntervalMinutes = 15;
        let isRefreshing = false;
        let countdownTimer = null;

        // Check if we're running with server API
        // Server API is only available when running server.py, not with simple http.server
        let hasServerAPI = false;

        // Detect server API availability
        async function detectServerAPI() {
            try {
                const response = await fetch(`${API_BASE}/api/status`, { 
                    method: 'GET',
                    signal: AbortSignal.timeout(2000)
                });
                hasServerAPI = response.ok;
            } catch (e) {
                hasServerAPI = false;
            }
        }

        // Format number
        function formatNumber(num) {
            if (num >= 1000000) return (num / 1000000).toFixed(1) + 'M';
            if (num >= 1000) return (num / 1000).toFixed(1) + 'K';
            return num.toString();
        }

        // Format time - converts UTC to local timezone
        function formatTime(isoString) {
            if (!isoString) return '--';
            // Treat as UTC if no timezone specified
            const date = isoString.endsWith('Z') || isoString.includes('+') 
                ? new Date(isoString) 
                : new Date(isoString + 'Z');
            return date.toLocaleString('zh-CN', {
                month: '2-digit',
                day: '2-digit',
                hour: '2-digit',
                minute: '2-digit',
                second: '2-digit'
            });
        }

        // Format short time (for chart labels) - converts UTC to local timezone
        function formatShortTime(isoString) {
            if (!isoString) return '--';
            // Treat as UTC if no timezone specified
            const date = isoString.endsWith('Z') || isoString.includes('+') 
                ? new Date(isoString) 
                : new Date(isoString + 'Z');
            const hours = date.getHours().toString().padStart(2, '0');
            const minutes = date.getMinutes().toString().padStart(2, '0');
            return `${hours}:${minutes}`;
        }

        // Format remaining time
        function formatRemaining(timestamp) {
            const now = Date.now();
            const diff = timestamp - now;
            if (diff <= 0) return '即将重置';

            const hours = Math.floor(diff / (1000 * 60 * 60));
            const minutes = Math.floor((diff % (1000 * 60 * 60)) / (1000 * 60));

            if (hours >= 24) {
                const days = Math.floor(hours / 24);
                return `${days}天 ${hours % 24}小时`;
            }
            return `${hours}小时 ${minutes}分钟`;
        }

        // Format countdown
        function formatCountdown(seconds) {
            if (seconds <= 0) return '即将更新';
            const mins = Math.floor(seconds / 60);
            const secs = seconds % 60;
            return `${mins}分${secs}秒`;
        }

        // Get progress bar color class
        function getProgressClass(percentage) {
            if (percentage < 50) return 'low';
            if (percentage < 80) return 'medium';
            return 'high';
        }

        // Update countdown display
        function updateCountdown() {
            if (!nextUpdateTime) {
                document.getElementById('countdown').textContent = '--';
                return;
            }

            const now = Date.now();
            const diff = Math.max(0, Math.floor((nextUpdateTime - now) / 1000));
            document.getElementById('countdown').textContent = formatCountdown(diff);
        }

        // Update server status
        async function updateServerStatus() {
            if (!hasServerAPI) return;

            try {
                const response = await fetch(`${API_BASE}/api/status`);
                if (response.ok) {
                    const status = await response.json();
                    lastUpdateTime = status.last_update ? new Date(status.last_update) : null;
                    nextUpdateTime = status.next_update ? new Date(status.next_update) : null;
                    refreshIntervalMinutes = status.refresh_interval_minutes || 15;
                    document.getElementById('refresh-interval').textContent = refreshIntervalMinutes;
                    document.getElementById('last-update').textContent = formatTime(status.last_update);
                }
            } catch (e) {
                console.log('Server status not available');
            }
        }

        // Force refresh
        async function forceRefresh() {
            if (isRefreshing) return;

            isRefreshing = true;
            const btn = document.getElementById('refresh-btn');
            const icon = document.getElementById('refresh-icon');

            btn.disabled = true;
            icon.innerHTML = '<span class="spinner"></span>';
            document.getElementById('status-dot').className = 'dot refreshing';
            document.getElementById('status-text').textContent = '正在更新...';

            try {
                if (hasServerAPI) {
                    // Trigger server refresh
                    const response = await fetch(`${API_BASE}/api/refresh`, { method: 'POST' });
                    if (response.ok) {
                        const status = await response.json();
                        lastUpdateTime = status.last_update ? new Date(status.last_update) : null;
                        nextUpdateTime = status.next_update ? new Date(status.next_update) : null;
                        document.getElementById('last-update').textContent = formatTime(status.last_update);
                    }
                }

                // Wait a moment for data to be written
                await new Promise(resolve => setTimeout(resolve, 2000));

                // Reload data
                await loadData();
            } catch (e) {
                console.error('Refresh failed:', e);
            } finally {
                isRefreshing = false;
                btn.disabled = false;
                icon.innerHTML = '🔄';
            }
        }

        // Render main content
        function renderContent(data) {
            const latest = data.records[data.records.length - 1];
            const quotaLimits = latest.results.quota_limits;
            const modelUsage = latest.results.model_usage;
            const toolUsage = latest.results.tool_usage;

            // Update status bar
            const isSuccess = quotaLimits?.success || quotaLimits?.code === 200;
            document.getElementById('status-dot').className = 'dot ' + (isSuccess ? 'online' : 'offline');
            document.getElementById('status-text').textContent = isSuccess ? 'API 正常' : 'API 异常';
            
            if (!lastUpdateTime) {
                document.getElementById('last-update').textContent = formatTime(latest.query_time);
            }
            
            document.getElementById('account-level').textContent = (quotaLimits?.data?.level || 'MAX').toUpperCase();

            // Build HTML
            let html = '<div class="cards-grid">';
            html += renderQuotaCard(quotaLimits);
            html += renderModelCard(modelUsage);
            html += renderToolCard(toolUsage);
            html += '</div>';
            html += renderHistoryChart(data.records);

            document.getElementById('content').innerHTML = html;
        }

        // Render quota card
        function renderQuotaCard(quotaLimits) {
            const limits = quotaLimits?.data?.limits || quotaLimits?.limits || [];
            let html = `
                <div class="card">
                    <div class="card-header">
                        <div class="card-icon quota">📊</div>
                        <div class="card-title">
                            <h2>配额限制</h2>
                            <span>Quota Limits</span>
                        </div>
                    </div>
            `;

            const typeNames = {
                'TOKENS_LIMIT': '🎫 Token 限额',
                'TIME_LIMIT': '🔧 MCP 工具限额'
            };

            for (const limit of limits) {
                const type = limit.type;
                const unit = limit.unit;
                const number = limit.number;
                const percentage = limit.percentage || 0;
                const nextReset = limit.nextResetTime;

                let name = typeNames[type] || type;
                if (type === 'TOKENS_LIMIT') {
                    if (unit === 3 && number === 5) name = '⏱️ 5小时滚动窗口';
                    else if (unit === 6 && number === 1) name = '📅 周度限额';
                }

                html += `
                    <div class="quota-item">
                        <div class="quota-label">
                            <span class="name">${name}</span>
                            <span class="percentage">${percentage}%</span>
                        </div>
                        <div class="progress-bar">
                            <div class="progress-fill ${getProgressClass(percentage)}" style="width: ${percentage}%"></div>
                        </div>
                        <div class="quota-meta">
                            <span>${nextReset ? '重置: ' + formatRemaining(nextReset) : ''}</span>
                            ${type === 'TIME_LIMIT' ? `<span>剩余: ${formatNumber(limit.remaining || 0)}</span>` : ''}
                        </div>
                    </div>
                `;
            }

            html += '</div>';
            return html;
        }

        // Render model card
        function renderModelCard(modelUsage) {
            const data = modelUsage?.data || modelUsage;
            const total = data?.totalUsage || {};
            const totalCalls = total.totalModelCallCount || 0;
            const totalTokens = total.totalTokensUsage || 0;

            return `
                <div class="card">
                    <div class="card-header">
                        <div class="card-icon model">🤖</div>
                        <div class="card-title">
                            <h2>模型使用 (24h)</h2>
                            <span>Model Usage</span>
                        </div>
                    </div>
                    <div class="stats-grid">
                        <div class="stat-item">
                            <div class="stat-value blue">${formatNumber(totalCalls)}</div>
                            <div class="stat-label">调用次数</div>
                        </div>
                        <div class="stat-item">
                            <div class="stat-value purple">${formatNumber(totalTokens)}</div>
                            <div class="stat-label">Token 使用</div>
                        </div>
                        <div class="stat-item">
                            <div class="stat-value green">${totalCalls > 0 ? (totalTokens / totalCalls).toFixed(0) : 0}</div>
                            <div class="stat-label">平均 Tokens/调用</div>
                        </div>
                        <div class="stat-item">
                            <div class="stat-value orange">${Math.floor(totalTokens / 1000000 * 100) / 100}</div>
                            <div class="stat-label">百万 Tokens</div>
                        </div>
                    </div>
                </div>
            `;
        }

        // Render tool card
        function renderToolCard(toolUsage) {
            const data = toolUsage?.data || toolUsage;
            const total = data?.totalUsage || {};
            const details = total.toolDetails || [];

            let toolsHtml = '';
            const icons = {
                'search-prime': '🔍',
                'web-reader': '📖',
                'zread': '📚'
            };

            for (const tool of details) {
                const icon = icons[tool.modelName] || '🔧';
                toolsHtml += `
                    <div class="tool-item">
                        <div class="tool-name">
                            <span class="icon">${icon}</span>
                            <span>${tool.modelName}</span>
                        </div>
                        <span class="tool-count">${formatNumber(tool.totalUsageCount)}</span>
                    </div>
                `;
            }

            return `
                <div class="card">
                    <div class="card-header">
                        <div class="card-icon tool">🔧</div>
                        <div class="card-title">
                            <h2>工具使用 (24h)</h2>
                            <span>Tool Usage</span>
                        </div>
                    </div>
                    <div class="tool-list">
                        <div class="tool-item">
                            <div class="tool-name">
                                <span class="icon">📊</span>
                                <span>总调用</span>
                            </div>
                            <span class="tool-count">${formatNumber(total.totalSearchMcpCount || 0)}</span>
                        </div>
                        ${toolsHtml}
                    </div>
                </div>
            `;
        }

        // Render history chart
        function renderHistoryChart(records) {
            const recent = records.slice(-20);
            const labels = [];
            const values = [];

            for (const record of recent) {
                const modelUsage = record.results.model_usage?.data || record.results.model_usage;
                const total = modelUsage?.totalUsage?.totalTokensUsage || 0;
                labels.push(formatShortTime(record.query_time));
                values.push(total);
            }

            const maxVal = Math.max(...values, 1);

            let barsHtml = '';
            for (let i = 0; i < values.length; i++) {
                const height = (values[i] / maxVal) * 100;
                barsHtml += `<div class="chart-bar" style="height: ${height}%" data-value="${formatNumber(values[i])}"></div>`;
            }

            let labelsHtml = '';
            for (let i = 0; i < labels.length; i++) {
                labelsHtml += `<span>${labels[i].split(' ')[1] || labels[i]}</span>`;
            }

            return `
                <div class="history-section">
                    <div class="history-header">
                        <h2>📈 Token 使用趋势</h2>
                        <span style="color: #888">最近 ${records.length} 次查询</span>
                    </div>
                    <div class="chart-container">
                        <div class="chart">
                            ${barsHtml}
                        </div>
                        <div class="chart-labels">
                            ${labelsHtml}
                        </div>
                    </div>
                </div>
            `;
        }

        // Render error
        function renderError(message) {
            document.getElementById('status-dot').className = 'dot offline';
            document.getElementById('status-text').textContent = '加载失败';

            document.getElementById('content').innerHTML = `
                <div class="error-message">
                    <h2>❌ 加载失败</h2>
                    <p>${message}</p>
                    <button class="btn" onclick="forceRefresh()">重新加载</button>
                </div>
            `;
        }

        // Load data
        async function loadData() {
            try {
                const url = hasServerAPI 
                    ? `${API_BASE}/api/history?t=${Date.now()}`
                    : `${JSON_FILE}?t=${Date.now()}`;

                const response = await fetch(url);
                if (!response.ok) throw new Error('无法加载数据文件');

                const data = await response.json();
                if (!data.records || data.records.length === 0) {
                    throw new Error('没有可用的历史记录');
                }

                renderContent(data);
            } catch (error) {
                renderError(error.message);
            }
        }

        // Initialize
        async function init() {
            // First detect if server API is available
            await detectServerAPI();
            console.log('Server API available:', hasServerAPI);
            
            await updateServerStatus();
            await loadData();

            // Start countdown timer
            countdownTimer = setInterval(updateCountdown, 1000);

            // Auto refresh page data
            setInterval(async () => {
                await updateServerStatus();
                await loadData();
            }, REFRESH_INTERVAL);
        }

        init();
    </script>
</body>
</html>
