services:
  api-usage-monitor:
    build: .
    container_name: api_usage_monitor
    restart: unless-stopped
    network_mode: bridge
    ports:
      - "23098:8080"
    environment:
      - PORT=8080
      - REFRESH_INTERVAL=15  # minutes
    volumes:
      # Persist all data (NAS path: /volume6/docker/API_Usage)
      # Contains: .env, usage_history.json
      - /volume6/docker/API_Usage:/app/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/api/status"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
